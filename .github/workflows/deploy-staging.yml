# Deploy para staging quando o código é mergeado na branch develop

name: Staging Deployment

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/quality-checks.yml

  deploy:
    needs: quality
    uses: ./.github/workflows/ecs-deploy.yml
    with:
      environment: Staging
    secrets: inherit
