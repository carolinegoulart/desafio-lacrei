# Jobs compartilhados: testes unitários + ESLint.

name: Quality checks

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Busca o código no repositório
      - name: Checkout code
        uses: actions/checkout@v6

      # Setup Node + cache
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Instala as dependências
      - name: Install dependencies
        run: npm ci

      # Executa os testes unitários
      - name: Unit tests
        run: npm test

  lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      # Busca o código no repositório
      - name: Checkout code
        uses: actions/checkout@v6

      # Setup Node + cache
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Instala as dependências
      - name: Install dependencies
        run: npm ci

      # Executa o linting
      - name: Run lint
        run: npm run lint
