name: "Production Deployment"

on:
  push:
    branches:
      - main
  
jobs:
  # Executa os testes unitários
  test:
    runs-on: ubuntu-latest
    
    steps:
      # Busca o código no repositório
      - name: "Checkout code"
        uses: actions/checkout@v6
    
      # Setup Node + cache
      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      # Instala as dependências
      - name: "Install dependencies"
        run: npm ci

      # Executa os testes unitários
      - name: "Unit tests"
        run: npm test

  # Validação de linting
  lint:
    runs-on: ubuntu-latest
    needs: test

    steps:
      # Busca o código no repositório
      - name: "Checkout code"
        uses: actions/checkout@v6

      # Setup Node + cache
      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      # Instala as dependências
      - name: "Install dependencies"
        run: npm ci

      # Executa o linting
      - name: "Run lint"
        run: npm run lint

  # Build e push da imagem para o ECR
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    environment: Production

    steps:
      # Busca o código no repositório
      - name: "Checkout code"
        uses: actions/checkout@v6

      # Autenticação AWS
      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: "us-east-1"
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Login no ECR
      - name: "Login to Amazon ECR"
        uses: aws-actions/amazon-ecr-login@v2

      # Build da imagem
      - name: "Build Docker image"
        env:
          IMAGE_URI: ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} 
        run: |
          docker build -t $IMAGE_URI .

      # Push para o ECR
      - name: "Push Docker image"
        env:
          IMAGE_URI: ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} 
        run: |
          docker push $IMAGE_URI

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Production

    steps:
      # Autenticação AWS
      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: "us-east-1"
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Faz o download e limpa a task definition
      - name: Download and clean task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
          | jq 'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy,
              .enableFaultInjection
            )' > task-definition.json

      # Atualiza a task definition no ECS
      - name: "Render task definition"
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      # Deploy no ECS
      - name: "Deploy to ECS"
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
